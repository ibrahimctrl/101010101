<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABUMOUSA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:monospace;
}

body{
    overflow:hidden;
    background:#000;
}

/* 🎥 الخلفية */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    z-index:-1;
}

/* ===== النصوص الجانبية ===== */

.side{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    color:rgba(255,0,0,.8);
    font-size:20px;
    font-weight:bold;
    line-height:1.8;
    letter-spacing:2px;
    text-shadow:0 0 10px red, 0 0 25px red;
    animation:flicker 1.2s infinite, shake .6s infinite;
    z-index:1;
}

.left{
    left:25px;
    transform:translateY(-50%) rotate(-15deg);
}

.right{
    right:25px;
    text-align:right;
    transform:translateY(-50%) rotate(15deg);
}

/* وميض */
@keyframes flicker{
    0%{opacity:1;}
    10%{opacity:.2;}
    20%{opacity:1;}
    30%{opacity:.4;}
    40%{opacity:1;}
    60%{opacity:.3;}
    80%{opacity:1;}
    100%{opacity:.7;}
}

/* اهتزاز */
@keyframes shake{
    0%{transform:translateY(-50%) rotate(-15deg) translate(0,0);}
    25%{transform:translateY(-50%) rotate(-15deg) translate(-2px,2px);}
    50%{transform:translateY(-50%) rotate(-15deg) translate(2px,-2px);}
    75%{transform:translateY(-50%) rotate(-15deg) translate(-2px,-2px);}
    100%{transform:translateY(-50%) rotate(-15deg) translate(0,0);}
}

/* ===== العنوان ===== */

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.title{
    color:#fff;
    font-size:50px;
    margin-bottom:25px;
    text-shadow:0 0 15px red, 0 0 40px red, 0 0 80px darkred;
}

.glitch{
    animation:glitch .8s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-1px,1px);}
    50%{transform:translate(1px,-1px);}
    75%{transform:translate(-1px,-1px);}
    100%{transform:translate(0);}
}

/* ===== التيرمنال ===== */

.terminal{
    min-width:520px;
    padding:25px;
    background:rgba(0,0,0,.8);
    border:1px solid rgba(255,0,0,.4);
    box-shadow:0 0 35px rgba(255,0,0,.3);
    color:#ff2b2b;
    font-size:18px;
    text-align:left;
    backdrop-filter:blur(8px);
}

.line{
    margin:8px 0;
    text-shadow:0 0 8px #ff2b2b;
}

.blink{
    animation:blink .7s infinite;
    color:#ff0000;
    text-shadow:0 0 12px red;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}

</style>
</head>

<body>

<!-- 🎥 الخلفية -->
<video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 👁️ الجوانب -->
<div class="side left">
SYSTEM BREACHED<br>
TRACE ACTIVE<br>
YOU ARE WATCHED
</div>

<div class="side right">
ACCESS DENIED<br>
FIREWALL DOWN<br>
LOCATION LOGGED
</div>

<!-- 💻 المركز -->
<div class="center">

    <div class="title glitch">ABUMOUSA SYSTEM</div>

    <div class="terminal">

        <div class="line">Initializing system...</div>
        <div class="line">Scanning network...</div>
        <div class="line">Bypassing security...</div>

        <div class="line">IP: <span id="ip"></span></div>
        <div class="line">Country: <span id="country"></span></div>
        <div class="line">City: <span id="city"></span></div>
        <div class="line">ISP: <span id="isp"></span></div>

        <div class="line blink">_</div>

    </div>

</div>

<script>

/* ⌨️ typing effect */
function typeText(el, text, speed = 40){
    let i = 0;
    el.textContent = "";

    const interval = setInterval(()=>{
        el.textContent += text[i];
        i++;
        if(i >= text.length) clearInterval(interval);
    }, speed);
}

/* 🌍 جلب IP */
async function loadInfo(){
    try{
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();

        typeText(document.getElementById("ip"), data.ip || "Unknown");
        typeText(document.getElementById("country"), data.country_name || "Unknown");
        typeText(document.getElementById("city"), data.city || "Unknown");
        typeText(document.getElementById("isp"), data.org || "Unknown");

    }catch(e){
        typeText(document.getElementById("ip"), "Unavailable");
        typeText(document.getElementById("country"), "Unavailable");
        typeText(document.getElementById("city"), "Unavailable");
        typeText(document.getElementById("isp"), "Unavailable");
    }
}

loadInfo();

</script>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
    window.addEventListener("load", () => {
        const audio = document.getElementById("bgMusic");
        audio.volume = 0.5;
        audio.play().catch(() => {
            console.log("Autoplay blocked");
        });
    });
</script>

</body>
</html>
